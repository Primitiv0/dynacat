<!DOCTYPE html>
<html lang="en" id="top" data-theme="{{ .Request.Theme.Key }}" data-scheme="{{ if .Request.Theme.Light }}light{{ else }}dark{{ end }}">
<head>
    {{ block "document-head-before" . }}{{ end }}
    <script>
    if (navigator.platform === 'iPhone') document.documentElement.classList.add('ios');
    const pageData = {
        /*{{ if .Page }}*/
        slug: "{{ .Page.Slug }}",
        updateInterval: {{ .Page.GetMinUpdateInterval }},
        /*{{ end }}*/
        baseURL: "{{ .App.Config.Server.BaseURL }}",
        theme: "{{ .Request.Theme.Key }}",
        dynamicUpdateEnabled: {{ if .Page }}{{ and .App.DynamicUpdateEnabled (.Page.DynamicUpdatesEnabled) }}{{ else }}{{ .App.DynamicUpdateEnabled }}{{ end }},
    };
    </script>
    <title>{{ block "document-title" . }}{{ end }}</title>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="dark">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="{{ .App.Config.Branding.AppName }}">
    <meta name="theme-color" content="{{ .Request.Theme.BackgroundColorAsHex }}">
    <link rel="apple-touch-icon" sizes="512x512" href='{{ .App.Config.Branding.AppIconURL }}'>
    <link rel="manifest" href='{{ .App.VersionedAssetPath "manifest.json" }}'>
    <link rel="icon" type="{{ .App.Config.Branding.FaviconType }}" href="{{ .App.Config.Branding.FaviconURL }}" />
    <link rel="stylesheet" href='{{ .App.StaticAssetPath "css/bundle.css" }}'>
    <style id="theme-style">{{ .Request.Theme.CSS }}</style>
    <script>
    // Restore theme from localStorage before paint when the server cookie was
    // lost or stale, so a reload never drops back to the default theme.
    (function() {
        try {
            pageData.serverTheme = pageData.theme;
            var raw = localStorage.getItem("dynacat-theme");
            if (!raw) return;
            var stored = JSON.parse(raw);
            if (!stored || !stored.key || stored.key === pageData.theme) return;
            var styleElem = document.getElementById("theme-style");
            if (styleElem && typeof stored.css === "string") styleElem.textContent = stored.css;
            document.documentElement.setAttribute("data-theme", stored.key);
            if (stored.scheme) document.documentElement.setAttribute("data-scheme", stored.scheme);
            pageData.theme = stored.key;
        } catch (e) {}
    })();
    </script>
    {{ if .App.Config.Theme.CustomCSSFile }}<link rel="stylesheet" href="{{ .App.Config.Theme.CustomCSSFile }}?v={{ .App.CreatedAt.Unix }}">{{ end }}
    {{ block "document-head-after" . }}{{ end }}
    {{ if .App.Config.Document.Head }}{{ .App.Config.Document.Head }}{{ end }}
    <script src='{{ .App.StaticAssetPath "js/idiomorph.js" }}'></script>
</head>
<body>
{{ template "document-body" . }}
</body>
</html>
